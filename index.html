<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Generator v3.0</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #e74c3c; }
        .status { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; padding: 10px; background: #fdf2f2; border-radius: 4px; border: 1px solid #fab1a0; }
        h2 { color: #2c3e50; margin-top: 0; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; font-size: 0.95em; white-space: pre-wrap; }
        footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>National Request Generator <small style="font-size: 0.5em; color: #e74c3c;">(v3.0 - FORCE CLEAN)</small></h2>
        <div class="status" id="loadStatus">Waiting for GitHub...</div>
        
        <button id="genBtn" onclick="generatePlaylist()" disabled>Generate Clean Playlist</button>
        
        <div id="outputArea" style="display:none;">
            <h3>Playlist Output</h3>
            <pre id="playlistDisplay"></pre>
            <button style="background:#3498db; border:none; padding:10px; color:white; cursor:pointer;" onclick="downloadTxt()">Download .txt File</button>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZf2oqinMZWPB0z9dXTfbQxsuzssny4BV5-htEB-udb0quC7a0T8W-uXHbVcF8HycL4h_XBKveNVNm/pub?gid=984873385&single=true&output=csv';
        let libraryData = [];

        // v3.0 Ultra-Scrubber: Detects any [ date/time ] pattern and nukes it.
        function forceClean(text) {
            if (!text) return "";
            // Removes anything inside [ ] regardless of content
            let clean = text.replace(/\[.*?\]/g, "");
            // Removes any leading dashes or special chars left behind
            clean = clean.replace(/^[\s\-\:\.\/]+/, ""); 
            return clean.trim();
        }

        async function fetchLibrary() {
            try {
                // Versioning the URL to kill cache
                const response = await fetch(SHEET_URL + "&v=3.0_" + Date.now());
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                
                libraryData = rows.map(row => {
                    const cols = row.split(',');
                    if (cols.length < 7) return null;
                    
                    return {
                        pos: cols[0].trim(),
                        artist: forceClean(cols[1]), 
                        title: forceClean(cols[2]),  
                        cat: cols[3].trim().toUpperCase(),
                        gender: cols[5].trim().toUpperCase(),
                        score: parseFloat(cols[6]) || 1
                    };
                }).filter(r => r && r.artist !== "");

                document.getElementById('loadStatus').innerText = "v3.0 Ready: " + libraryData.length + " Songs scrubbed.";
                document.getElementById('genBtn').disabled = false;
            } catch (e) {
                document.getElementById('loadStatus').innerText = "Sync Error.";
            }
        }

        function generatePlaylist() {
            const pattern = ["A", "B", "A", "C"];
            let playlist = [];
            let usedArtists = new Set();
            let lastGender = "";

            for (let i = 1; i <= 18; i++) {
                let category = pattern[(i - 1) % 4];
                let pool = libraryData.filter(s => s.cat === category && !usedArtists.has(s.artist));
                
                let genderPool = pool.filter(s => s.gender !== lastGender);
                let finalPool = genderPool.length > 0 ? genderPool : pool;

                if (finalPool.length > 0) {
                    let total = finalPool.reduce((sum, s) => sum + s.score, 0);
                    let rand = Math.random() * total;
                    let count = 0;
                    let pick = finalPool[0];

                    for (let s of finalPool) {
                        count += s.score;
                        if (count >= rand) { pick = s; break; }
                    }

                    playlist.push({ slot: i, ...pick });
                    usedArtists.add(pick.artist);
                    lastGender = pick.gender;
                }
            }
            render(playlist);
        }

        function render(list) {
            let out = "--- NATIONAL REQUEST PLAYLIST ---\n\n";
            list.forEach(s => {
                let type = s.slot <= 14 ? "[STRICT] " : "[OPTIONAL]";
                out += `${s.slot.toString().padStart(2, '0')}. ${type} [${s.gender}] ${s.artist} - ${s.title} (Chart Position: #${s.pos})\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
        }

        function downloadTxt() {
            const blob = new Blob([document.getElementById('playlistDisplay').innerText], {type: 'text/plain'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "National_Request_Playlist.txt";
            a.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
