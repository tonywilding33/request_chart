<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Generator v4.0</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #e74c3c; }
        .status { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; padding: 10px; background: #fdf2f2; border-radius: 4px; border: 1px solid #fab1a0; }
        h2 { color: #2c3e50; margin-top: 0; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; font-size: 0.95em; white-space: pre-wrap; }
        footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>National Request Generator <small style="font-size: 0.5em; color: #e74c3c;">(v4.0 - BRUTE FORCE)</small></h2>
        <div class="status" id="loadStatus">Waiting for Database...</div>
        
        <button id="genBtn" onclick="generatePlaylist()" disabled>Generate 1-Hour Playlist</button>
        
        <div id="outputArea" style="display:none;">
            <h3>Generated Playlist</h3>
            <pre id="playlistDisplay"></pre>
            <button style="background:#3498db; color:white; border:none; padding:10px; cursor:pointer;" onclick="downloadTxt()">Download PlayList.txt</button>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZf2oqinMZWPB0z9dXTfbQxsuzssny4BV5-htEB-udb0quC7a0T8W-uXHbVcF8HycL4h_XBKveNVNm/pub?gid=984873385&single=true&output=csv';
        let libraryData = [];

        // The "Nuke" Scrubber: Targets brackets, slashes, and colons in one go
        function nukeDate(text) {
            if (!text) return "";
            // 1. Remove anything in [ ]
            let clean = text.replace(/\[.*?\]/g, "");
            // 2. Remove anything that looks like a date (00/00/0000)
            clean = clean.replace(/\d{1,2}\/\d{1,2}\/\d{2,4}/g, "");
            // 3. Remove anything that looks like a time (00:00)
            clean = clean.replace(/\d{1,2}:\d{2}/g, "");
            // 4. Clean up any weird symbols or double spaces left behind
            return clean.replace(/[^\w\s\-\&\(\)\'\.]/g, " ").replace(/\s\s+/g, ' ').trim();
        }

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL + "&cb=" + Date.now());
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    let cols = line.split(',');
                    if (cols.length >= 7) {
                        return {
                            pos: cols[0].trim(),
                            artist: nukeDate(cols[1]),
                            title: nukeDate(cols[2]),
                            cat: cols[3].trim().toUpperCase(),
                            gender: cols[5].trim().toUpperCase(),
                            score: parseFloat(cols[6]) || 1
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist !== "");
                
                document.getElementById('loadStatus').innerHTML = `v4.0 Online: ${libraryData.length} Clean Songs Ready.`;
                document.getElementById('genBtn').disabled = false;
            } catch (err) {
                document.getElementById('loadStatus').innerHTML = "Connection Error.";
            }
        }

        function generatePlaylist() {
            const pattern = ["A", "B", "A", "C"];
            let playlist = [];
            let usedArtists = new Set();
            let lastGender = "";

            for (let slot = 1; slot <= 18; slot++) {
                let category = pattern[(slot - 1) % 4];
                let pool = libraryData.filter(r => r.cat === category && !usedArtists.has(r.artist));
                
                // Keep the gender balance but make it a soft rule to avoid empty pools
                let genderPool = pool.filter(r => r.gender !== lastGender);
                let finalPool = genderPool.length > 0 ? genderPool : pool;

                if (finalPool.length > 0) {
                    // Weighted random
                    let total = finalPool.reduce((sum, r) => sum + r.score, 0);
                    let threshold = Math.random() * total;
                    let runningSum = 0;
                    let pick = finalPool[0];

                    for (let s of finalPool) {
                        runningSum += s.score;
                        if (runningSum >= threshold) { pick = s; break; }
                    }

                    playlist.push({ slot: slot, ...pick });
                    usedArtists.add(pick.artist);
                    lastGender = pick.gender;
                }
            }
            display(playlist);
        }

        function display(list) {
            let out = "--- NATIONAL REQUEST PLAYLIST ---\n\n";
            list.forEach(s => {
                let status = s.slot <= 14 ? "[STRICT]  " : "[OPTIONAL]";
                out += `${s.slot.toString().padStart(2, '0')}. ${status} [${s.cat}] [${s.gender}] ${s.artist} - ${s.title} (Chart Position: #${s.pos})\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
        }

        function downloadTxt() {
            const blob = new Blob([document.getElementById('playlistDisplay').innerText], {type: 'text/plain'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "National_Playlist_v4.txt";
            a.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
