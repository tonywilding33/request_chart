<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Playlist Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #3498db; }
        .status { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; padding: 10px; background: #ebf5fb; border-radius: 4px; }
        h2 { color: #2c3e50; margin-top: 0; }
        button { background: #27ae60; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; transition: 0.2s; }
        button:hover { background: #219150; transform: translateY(-1px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; overflow-x: auto; border-radius: 4px; font-size: 0.95em; white-space: pre-wrap; line-height: 1.4; }
        .download-btn { background: #3498db; margin-top: 15px; }
        footer { margin-top: 30px; padding-top: 15px; border-top: 1px solid #ddd; font-size: 0.85em; color: #7f8c8d; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="box">
        <h2>National Request Playlist Generator</h2>
        <div class="status" id="loadStatus">Connecting to Database...</div>
        
        <button id="genBtn" onclick="generatePlaylist()" disabled>Generate 1-Hour Playlist</button>
        
        <div id="outputArea" style="display:none;">
            <h3>Generated Playlist</h3>
            <pre id="playlistDisplay"></pre>
            <button class="download-btn" onclick="downloadTxt()">Download PlayList.txt</button>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZf2oqinMZWPB0z9dXTfbQxsuzssny4BV5-htEB-udb0quC7a0T8W-uXHbVcF8HycL4h_XBKveNVNm/pub?gid=984873385&single=true&output=csv';
        let libraryData = [];

        // Scrubber to remove any bracketed data like [24/04/2026 23:30]
        function universalScrub(str) {
            if (!str) return "";
            return str.replace(/\[.*?\]/g, "").replace(/\s\s+/g, ' ').trim();
        }

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL + "&cb=" + Date.now());
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    let cols = line.split(',');
                    if (cols.length >= 7) {
                        return {
                            pos: cols[0].trim(),
                            artist: universalScrub(cols[1]),
                            title: universalScrub(cols[2]),
                            cat: cols[3].trim().toUpperCase(),
                            gender: cols[5].trim().toUpperCase(),
                            score: parseFloat(cols[6]) || 1
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist !== "");
                
                document.getElementById('loadStatus').innerHTML = `Library Online: ${libraryData.length} songs synced.`;
                document.getElementById('genBtn').disabled = false;
            } catch (err) {
                document.getElementById('loadStatus').innerHTML = "Error connecting to database.";
            }
        }

        function generatePlaylist() {
            const pattern = ["A", "B", "A", "C"];
            let playlist = [];
            let usedArtists = new Set();

            for (let slot = 1; slot <= 18; slot++) {
                let category = pattern[(slot - 1) % 4];
                
                let pool = libraryData.filter(r => 
                    r.cat === category && !usedArtists.has(r.artist)
                );
                
                if (pool.length > 0) {
                    // Weighted Selection (Using Score)
                    let totalScore = pool.reduce((sum, r) => sum + r.score, 0);
                    let threshold = Math.random() * totalScore;
                    let runningSum = 0;
                    let pick = pool[0];

                    for (let song of pool) {
                        runningSum += song.score;
                        if (runningSum >= threshold) {
                            pick = song;
                            break;
                        }
                    }

                    playlist.push({
                        slot: slot,
                        pos: pick.pos,
                        artist: pick.artist,
                        title: pick.title,
                        gender: pick.gender
                    });
                    usedArtists.add(pick.artist);
                }
            }
            displayPlaylist(playlist);
        }

        function displayPlaylist(list) {
            let generatedText = "--- NATIONAL REQUEST PLAYLIST ---\n\n";
            list.forEach(s => {
                let status = s.slot <= 14 ? "[STRICT]  " : "[OPTIONAL]";
                generatedText += `${s.slot.toString().padStart(2, '0')}. ${status} [${s.gender}] ${s.artist} - ${s.title} (Chart Position: #${s.pos})\n`;
            });

            document.getElementById('playlistDisplay').innerText = generatedText;
            document.getElementById('outputArea').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function downloadTxt() {
            const text = document.getElementById('playlistDisplay').innerText;
            const element = document.createElement("a");
            const file = new Blob([text], {type: 'text/plain'});
            element.href = URL.createObjectURL(file);
            element.download = "PlayList.txt";
            document.body.appendChild(element);
            element.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
