<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Request Generator v16.0</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #9b59b6; }
        .status { font-size: 0.9em; color: #7f8c8d; margin-bottom: 20px; padding: 10px; background: #f5eef8; border-radius: 4px; border: 1px solid #9b59b6; }
        h2 { color: #2c3e50; margin-top: 0; }
        button { background: #9b59b6; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:disabled { background: #bdc3c7; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; font-size: 0.95em; white-space: pre-wrap; }
        footer { margin-top: 30px; font-size: 0.85em; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>National Request Generator <small style="font-size:0.6em; color:#9b59b6;">v16.0</small></h2>
        <div class="status" id="loadStatus">Awaiting Data...</div>
        
        <button id="genBtn" onclick="generatePlaylist()" disabled>Generate 1-Hour Playlist</button>
        
        <div id="outputArea" style="display:none;">
            <h3>Generated Playlist</h3>
            <pre id="playlistDisplay"></pre>
            <button style="background:#3498db; color:white; border:none; padding:10px; cursor:pointer;" onclick="downloadTxt()">Download PlayList.txt</button>
        </div>

        <footer>
            Credits: Developer Tony Wilding<br>
            Original National Request Chart Data (Top 500) Contributed by Mark W Snowdon
        </footer>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZf2oqinMZWPB0z9dXTfbQxsuzssny4BV5-htEB-udb0quC7a0T8W-uXHbVcF8HycL4h_XBKveNVNm/pub?gid=984873385&single=true&output=csv';
        let libraryData = [];

        // v16.0: Robust CSV parser that handles commas inside quotes correctly
        function parseCSVLine(text) {
            const result = [];
            let cur = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(cur.trim());
                    cur = '';
                } else cur += char;
            }
            result.push(cur.trim());
            return result;
        }

        function getOnlyLetter(val) {
            if (!val) return "";
            // Find the last M, F, or D in the string
            let matches = val.match(/[MFD](?!.*[MFD])/i);
            return matches ? matches[0].toUpperCase() : "";
        }

        async function fetchLibrary() {
            try {
                const response = await fetch(SHEET_URL + "&cache=" + Date.now());
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).slice(1);
                
                libraryData = lines.map(line => {
                    let cols = parseCSVLine(line);
                    if (cols.length >= 6) {
                        return {
                            pos: cols[0].replace(/#/g, ''),
                            artist: cols[1].replace(/^"|"$/g, ''), 
                            title: cols[2].replace(/^"|"$/g, ''),
                            cat: cols[3].toUpperCase(),
                            gender: getOnlyLetter(cols[5]) 
                        };
                    }
                    return null;
                }).filter(row => row !== null && row.artist !== "");
                
                document.getElementById('loadStatus').innerHTML = `v16.0 Ready: ${libraryData.length} entries.`;
                document.getElementById('genBtn').disabled = false;
            } catch (err) {
                document.getElementById('loadStatus').innerHTML = "Database Error.";
            }
        }

        function generatePlaylist() {
            const pattern = ["A", "B", "A", "C"];
            let playlist = [];
            let usedArtists = new Set();

            for (let slot = 1; slot <= 18; slot++) {
                let category = pattern[(slot - 1) % 4];
                let pool = libraryData.filter(r => r.cat === category && !usedArtists.has(r.artist));
                
                if (pool.length > 0) {
                    let pick = pool[Math.floor(Math.random() * pool.length)];
                    playlist.push({ slot: slot, ...pick });
                    usedArtists.add(pick.artist);
                }
            }
            display(playlist);
        }

        function display(list) {
            let out = "--- NATIONAL REQUEST PLAYLIST ---\n\n";
            list.forEach(s => {
                let status = s.slot <= 14 ? "[STRICT]  " : "[OPTIONAL]";
                out += `${s.slot.toString().padStart(2, '0')}. ${status} [${s.cat}] [${s.gender}] ${s.artist} - ${s.title} (Chart Position: #${s.pos})\n`;
            });
            document.getElementById('playlistDisplay').innerText = out;
            document.getElementById('outputArea').style.display = 'block';
        }

        function downloadTxt() {
            const blob = new Blob([document.getElementById('playlistDisplay').innerText], {type: 'text/plain'});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "PlayList.txt";
            a.click();
        }

        fetchLibrary();
    </script>
</body>
</html>
